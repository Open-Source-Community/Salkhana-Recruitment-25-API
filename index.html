<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Questions Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#ff6584;--text:#f0f0f8;--muted:#7a7a9a}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

    header{position:relative;padding:80px 40px 60px;text-align:center;overflow:hidden}
    header::after{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(108,99,255,0.2) 0%,transparent 70%);pointer-events:none}
    .committee-label{display:inline-block;font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(108,99,255,0.3);padding:6px 16px;border-radius:100px;margin-bottom:28px}
    h1{font-family:'Syne',sans-serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:800;line-height:1.05;letter-spacing:-0.02em;margin-bottom:20px}
    h1 span{background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .subtitle{font-size:17px;color:var(--muted);font-weight:300;max-width:500px;margin:0 auto}

    main{max-width:680px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}

    .form-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:24px}
    .section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}

    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
    input[type=text],input[type=number],select{width:100%;background:#0d0d14;border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;border-radius:8px;outline:none;transition:border-color 0.2s;margin-bottom:0}
    input[type=text]:focus,input[type=number]:focus,select:focus{border-color:rgba(108,99,255,0.5)}
    input[type=text]::placeholder,input[type=number]::placeholder{color:var(--muted)}
    select{appearance:none;cursor:pointer}
    select option{background:#16161f}

    .field-group{margin-bottom:28px}
    .criteria-label{font-size:12px;color:var(--muted);opacity:0.7;margin-bottom:10px;line-height:1.5}

    .input-row{display:flex;gap:8px;margin-bottom:8px}
    .input-row input{flex:1;margin-bottom:0}

    .icon-btn{width:36px;height:36px;border-radius:8px;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
    .add-btn{background:rgba(108,99,255,0.15);color:var(--accent)}
    .add-btn:hover{background:rgba(108,99,255,0.25)}
    .remove-btn{background:rgba(255,101,132,0.12);color:var(--accent2)}
    .remove-btn:hover{background:rgba(255,101,132,0.22)}

    .add-row-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);border-radius:8px;padding:6px 14px;cursor:pointer;transition:all 0.2s;margin-top:4px}
    .add-row-btn:hover{background:rgba(108,99,255,0.15)}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
    .field{display:flex;flex-direction:column;gap:6px}

    .divider{height:1px;background:var(--border);margin:24px 0}

    .generate-btn{width:100%;padding:14px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--accent),#9b59ff);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;letter-spacing:0.01em}
    .generate-btn:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(108,99,255,0.3)}
    .generate-btn:active{transform:translateY(0)}

    .message-box{margin-top:16px;padding:16px 20px;border-radius:10px;font-size:14px}
    .success{background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.25);color:#4ecba0}
    .error{background:rgba(220,53,69,0.1);border:1px solid rgba(220,53,69,0.25);color:#ff6b7a}
    .file-path{font-family:monospace;font-size:12px;opacity:0.7;margin-top:6px;word-break:break-all}

    .badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px;margin-left:8px}
    .badge-beginner{background:rgba(29,158,117,0.12);color:#4ecba0;border:1px solid rgba(29,158,117,0.2)}
    .badge-intermediate{background:rgba(108,99,255,0.12);color:#9b93ff;border:1px solid rgba(108,99,255,0.2)}
    .badge-advanced{background:rgba(255,101,132,0.12);color:#ff8ba0;border:1px solid rgba(255,101,132,0.2)}

    @media(max-width:600px){header{padding:60px 20px 40px}.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>

<header>
  <div class="committee-label">Interview Tools</div>
  <h1>Questions<br/><span>Generator</span></h1>
  <p class="subtitle">Generate structured interview question sets for committee evaluations.</p>
</header>

<main>
  <div class="form-card">
    <div class="section-title">Participants</div>
    <div class="two-col">
      <div class="field">
        <label>Interviewee Name</label>
        <input type="text" id="name" placeholder="e.g. Omnia Ibrahim" />
      </div>
      <div class="field">
        <label>Interviewer Name</label>
        <input type="text" id="interviewer" placeholder="e.g. Ahmed Hatem" />
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-title">Generate Random?</div>
    <div class="field" style="margin-bottom:0">
      <select id="random" onchange="toggleManualInputs()">
        <option value="0">No — I'll enter question numbers manually</option>
        <option value="1">Yes — generate randomly</option>
      </select>
    </div>
  </div>

  <div class="form-card" id="manual-section">
    <div class="section-title">Question Numbers</div>

    <!-- Beginner -->
    <div class="field-group">
      <label>Beginner Questions <span class="badge badge-beginner">Beginner</span></label>
      <div class="criteria-label">Criteria: (2) 1→13 · (1) 14→15 · (1) 16→18</div>
      <div id="beginner-container">
        <div class="input-row">
          <input type="number" placeholder="Question number" />
          <button class="icon-btn remove-btn" onclick="removeField(this)">−</button>
        </div>
      </div>
      <button class="add-row-btn" onclick="addField('beginner-container')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add question
      </button>
    </div>

    <!-- Intermediate -->
    <div class="field-group">
      <label>Intermediate Questions <span class="badge badge-intermediate">Intermediate</span></label>
      <div class="criteria-label">Criteria: (2) 1→14 · (1) 15→17 · (1) 18→19 · (1) 20→21</div>
      <div id="intermediate-container">
        <div class="input-row">
          <input type="number" placeholder="Question number" />
          <button class="icon-btn remove-btn" onclick="removeField(this)">−</button>
        </div>
      </div>
      <button class="add-row-btn" onclick="addField('intermediate-container')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add question
      </button>
    </div>

    <!-- Advanced -->
    <div class="field-group" style="margin-bottom:0">
      <label>Advanced Questions <span class="badge badge-advanced">Advanced</span></label>
      <div class="criteria-label">Criteria: (∞) 1→26</div>
      <div id="advanced-container">
        <div class="input-row">
          <input type="number" placeholder="Question number" />
          <button class="icon-btn remove-btn" onclick="removeField(this)">−</button>
        </div>
      </div>
      <button class="add-row-btn" onclick="addField('advanced-container')">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add question
      </button>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()">Generate Questions</button>
  <div id="message"></div>
</main>

<script>
  function addField(containerId) {
    const container = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'input-row';
    div.innerHTML = `<input type="number" placeholder="Question number" /><button class="icon-btn remove-btn" onclick="removeField(this)">−</button>`;
    container.appendChild(div);
  }

  function removeField(btn) {
    btn.parentElement.remove();
  }

  function toggleManualInputs() {
    const random = document.getElementById('random').value === '1';
    document.getElementById('manual-section').style.display = random ? 'none' : 'block';
  }

  async function generate() {
    const name = document.getElementById('name').value.trim();
    const interviewer = document.getElementById('interviewer').value.trim();
    const random = document.getElementById('random').value;

    if (!name || !interviewer) {
      alert('Please fill in both Interviewee and Interviewer names.');
      return;
    }

    let beginner = [], intermediate = [], advanced = [];

    if (random === '0') {
      beginner = Array.from(document.querySelectorAll('#beginner-container input')).map(i => i.value.trim()).filter(v => v);
      intermediate = Array.from(document.querySelectorAll('#intermediate-container input')).map(i => i.value.trim()).filter(v => v);
      advanced = Array.from(document.querySelectorAll('#advanced-container input')).map(i => i.value.trim()).filter(v => v);
    }

    const params = new URLSearchParams({ name, interviewer_name: interviewer, beginner: beginner.join(' '), intermediate: intermediate.join(' '), advanced: advanced.join(' '), random });

    const msgBox = document.getElementById('message');

    try {
      const res = await fetch(`http://localhost:3000/download?${params.toString()}`);
      const data = await res.json();

      if (data.filePath) {
        msgBox.innerHTML = `<div class="message-box success">
          <div style="font-weight:500;margin-bottom:4px">✓ File generated successfully</div>
          <div class="file-path">${data.filePath}</div>
        </div>`;
      } else {
        msgBox.innerHTML = `<div class="message-box error">${data.msg || 'Error generating file'}</div>`;
      }
    } catch (err) {
      msgBox.innerHTML = `<div class="message-box error">Could not reach the server. Make sure it's running on port 3000.</div>`;
    }
  }
</script>
</body>
</html>
